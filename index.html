<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Anti-flicker: set theme before first paint so light-mode users never see a dark flash -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('fypro_theme') || 'dark';
          var d = document.documentElement;
          d.setAttribute('data-theme', t);
          if (t === 'light') { d.classList.add('light'); d.classList.remove('dark'); }
          else               { d.classList.add('dark');  d.classList.remove('light'); }
        } catch(e) {}
      })();
    </script>
    <!-- Font preconnect — eliminates DNS + TLS lag for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/svg+xml" href="/shield-star.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-32x32.png" />
    <link rel="manifest" href="/manifest.json" />
