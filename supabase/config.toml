# Supabase local development configuration
# Docs: https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://fypro.vercel.app"]
jwt_expiry = 3600
enable_confirmations = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Declare the function so `supabase functions deploy email-nurture` works from CLI.
# The cron schedule is set in the Supabase dashboard (Database → Cron Jobs).
[functions.email-nurture]
verify_jwt = false
