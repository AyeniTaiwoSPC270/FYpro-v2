<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FYPro — You're all set</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Poppins:wght@400;500;600&display=swap">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Shell ─────────────────────────────────────────────── */
html, body {
  height: 100%;
  background: #060E18;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Poppins', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── Star canvas ────────────────────────────────────────── */
#star-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ── Ambient radial glow ────────────────────────────────── */
.bg-glow {
  position: fixed;
  top: -5%;
  left: 50%;
  transform: translateX(-50%);
  width: 760px;
  height: 760px;
  background: radial-gradient(ellipse at 50% 40%,
    rgba(0, 102, 255, 0.12) 0%,
    rgba(0, 102, 255, 0.05) 35%,
    rgba(0, 102, 255, 0.015) 58%,
    transparent 75%);
  pointer-events: none;
  z-index: 1;
}

/* ── Stage ──────────────────────────────────────────────── */
.stage {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 0 28px;
  max-width: 520px;
  width: 100%;
}

/* ── Shield wrapper ─────────────────────────────────────── */
.shield-wrap {
  position: relative;
  width: 88px;
  height: 88px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 30px;
  animation: shieldDrop 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
}

/* outer diffuse halo */
.shield-wrap::before {
  content: '';
  position: absolute;
  inset: -26px;
  border-radius: 50%;
  background: radial-gradient(ellipse,
    rgba(0, 102, 255, 0.17) 0%,
    rgba(0, 102, 255, 0.06) 45%,
    transparent 72%);
  animation: haloPulse 4s ease-in-out infinite;
}

/* mid ring */
.shield-ring-mid {
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  border: 1px solid rgba(0, 102, 255, 0.2);
  box-shadow: 0 0 20px rgba(0, 102, 255, 0.25), inset 0 0 10px rgba(0, 102, 255, 0.07);
  animation: haloPulse 4s ease-in-out infinite 0.7s;
}

/* inner ring */
.shield-ring-inner {
  position: absolute;
  inset: 5px;
  border-radius: 50%;
  border: 1px solid rgba(0, 102, 255, 0.3);
  background: rgba(0, 102, 255, 0.08);
}

.shield-svg {
  position: relative;
  z-index: 2;
  width: 58px;
  height: 58px;
  filter:
    drop-shadow(0 0 7px rgba(0, 102, 255, 1))
    drop-shadow(0 0 18px rgba(0, 102, 255, 0.65))
    drop-shadow(0 0 40px rgba(0, 102, 255, 0.28));
}

/* ── Divider dots ───────────────────────────────────────── */
.divider-dots {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 30px;
}

.dot {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: rgba(0, 102, 255, 0.35);
}

.dot.center {
  width: 4px;
  height: 4px;
  background: rgba(0, 102, 255, 0.65);
  box-shadow: 0 0 6px rgba(0, 102, 255, 0.5);
}

/* ── Heading ────────────────────────────────────────────── */
.heading {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 42px;
  font-weight: 400;
  line-height: 1.16;
  color: #ffffff;
  letter-spacing: -0.5px;
  margin-bottom: 18px;
  text-wrap: pretty;
}

/* ── Subtitle ───────────────────────────────────────────── */
.subtitle {
  font-size: 16px;
  font-weight: 400;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.7);
  margin-bottom: 14px;
  text-wrap: pretty;
}

/* ── Nudge ──────────────────────────────────────────────── */
.nudge {
  font-size: 13px;
  font-weight: 400;
  line-height: 1.7;
  color: rgba(255, 255, 255, 0.37);
  margin-bottom: 48px;
  text-wrap: pretty;
}

.nudge a {
  color: #3B82F6;
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-color: rgba(59, 130, 246, 0.4);
  transition: color 0.15s ease, text-decoration-color 0.15s ease;
  cursor: pointer;
}

.nudge a:hover {
  color: #60a5fa;
  text-decoration-color: rgba(96, 165, 250, 0.8);
}

/* ── CTA ────────────────────────────────────────────────── */
.btn-enter {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 17px 56px;
  background: #16A34A;
  color: #ffffff;
  font-family: 'Poppins', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.01em;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  box-shadow:
    0 0 0 1px rgba(22, 163, 74, 0.35),
    0 4px 22px rgba(22, 163, 74, 0.48),
    0 1px 4px rgba(0, 0, 0, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.13);
  transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
  white-space: nowrap;
}

.btn-enter:hover {
  background: #15803D;
  transform: translateY(-2px);
  box-shadow:
    0 0 0 1px rgba(22, 163, 74, 0.45),
    0 10px 36px rgba(22, 163, 74, 0.62),
    0 2px 8px rgba(0, 0, 0, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.16);
}

.btn-enter:active {
  transform: translateY(0);
  box-shadow:
    0 0 0 1px rgba(22, 163, 74, 0.3),
    0 2px 10px rgba(22, 163, 74, 0.35),
    inset 0 1px 0 rgba(255, 255, 255, 0.1);
}

.btn-arrow {
  font-size: 16px;
  display: inline-block;
  transition: transform 0.2s ease;
}

.btn-enter:hover .btn-arrow { transform: translateX(4px); }

/* ── Keyframes — transform only, never opacity ─────────── */
@keyframes shieldDrop {
  from { transform: translateY(-14px) scale(0.86); }
  to   { transform: translateY(0)      scale(1); }
}

/* Text elements — always visible, no entrance animation */
/* Shield is the animated hero; text just appears cleanly  */

@keyframes haloPulse {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50%       { opacity: 1;   transform: scale(1.07); }
}

/* ── Reduced motion ─────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  .shield-wrap, .shield-wrap::before, .shield-ring-mid,
  .divider-dots, .heading, .subtitle, .nudge, .btn-enter {
    animation: none !important;
    transform: none !important;
  }
}

</style>
</head>
<body>

<canvas id="star-canvas" aria-hidden="true"></canvas>
<div class="bg-glow" aria-hidden="true"></div>

<main class="stage" role="main">

  <!-- Shield -->
  <div class="shield-wrap" aria-hidden="true">
    <div class="shield-ring-mid"></div>
    <div class="shield-ring-inner"></div>
    <svg class="shield-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="#0066FF">
      <path d="M80.57,117A8,8,0,0,1,91,112.57l29,11.61V96a8,8,0,0,1,16,0v28.18l29-11.61A8,8,0,1,1,171,127.43l-30.31,12.12L158.4,163.2a8,8,0,1,1-12.8,9.6L128,149.33,110.4,172.8a8,8,0,1,1-12.8-9.6l17.74-23.65L85,127.43A8,8,0,0,1,80.57,117ZM224,56v56c0,52.72-25.52,84.67-46.93,102.19-23.06,18.86-46,25.27-47,25.53a8,8,0,0,1-4.2,0c-1-.26-23.91-6.67-47-25.53C57.52,196.67,32,164.72,32,112V56A16,16,0,0,1,48,40H208A16,16,0,0,1,224,56Zm-16,0L48,56l0,56c0,37.3,13.82,67.51,41.07,89.81A128.25,128.25,0,0,0,128,223.62a129.3,129.3,0,0,0,39.41-22.2C194.34,179.16,208,149.07,208,112Z"/>
    </svg>
  </div>

  <!-- Divider -->
  <div class="divider-dots" aria-hidden="true">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot center"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- Copy -->
  <h1 class="heading">🎉 You're all set, there.</h1>
  <p class="subtitle">Head to Step 1 to validate your topic with real research.</p>
  <p class="nudge">
    You're on the free plan — <a href="#" onclick="return false;">unlock</a> the 3-examiner defence panel whenever you're ready.
  </p>

  <!-- CTA -->
  <button class="btn-enter" onclick="enterFYPro()">
    Enter FYPro <span class="btn-arrow" aria-hidden="true">→</span>
  </button>

</main>

<script>
/* Ambient star field */
(function () {
  var c = document.getElementById('star-canvas');
  var ctx = c.getContext('2d');
  var stars = [];
  var N = 55;

  function resize() { c.width = innerWidth; c.height = innerHeight; }

  function init() {
    stars = [];
    for (var i = 0; i < N; i++) {
      stars.push({
        x: Math.random() * c.width,
        y: Math.random() * c.height,
        r: Math.random() * 0.85 + 0.15,
        a: Math.random() * 0.09 + 0.02,
        sp: Math.random() * 0.0005 + 0.0002,
        ph: Math.random() * Math.PI * 2
      });
    }
  }

  function frame(t) {
    ctx.clearRect(0, 0, c.width, c.height);
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      var a = s.a * (0.5 + 0.5 * Math.sin(s.ph + t * s.sp * 700));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(180,210,255,' + a + ')';
      ctx.fill();
    }
    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', function () { resize(); init(); });
  resize(); init();
  requestAnimationFrame(frame);
})();

function enterFYPro() {
  var stage = document.querySelector('.stage');
  stage.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
  stage.style.opacity = '0';
  stage.style.transform = 'scale(1.02) translateY(-8px)';
  setTimeout(function () {
    stage.style.opacity = '1';
    stage.style.transform = '';
  }, 480);
}
</script>
</body>
</html>
